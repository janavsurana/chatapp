<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Profile</title>

<link rel="stylesheet" href="style.css">

<style>
body{
    background:#111;
    color:white;
    font-family:Arial,sans-serif;
    margin:0;
}

.container{
    max-width:700px;
    margin:40px auto;
    padding:20px;
}

.card{
    background:#1d1d1d;
    padding:30px;
    border-radius:15px;
    text-align:center;
}

.avatar{
    width:120px;
    height:120px;
    border-radius:50%;
    background:#444;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:50px;
    margin:auto;
}

input,textarea{
    width:100%;
    padding:12px;
    margin-top:15px;
    background:#2a2a2a;
    color:white;
    border:none;
    border-radius:8px;
    box-sizing:border-box;
}

textarea{
    min-height:120px;
    resize:vertical;
}

button{
    margin-top:20px;
    padding:12px 25px;
    background:#4CAF50;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-size:16px;
}

button:hover{
    background:#43a047;
}
</style>

</head>

<body>

<div class="container">

<div class="card">

<div class="avatar">👤</div>

<h2 id="username">Loading...</h2>

<input
id="displayName"
type="text"
placeholder="Display Name">

<textarea
id="bio"
placeholder="Write something about yourself"></textarea>

<button onclick="saveProfile()">
Save Profile
</button>

</div>

</div>

<script>

async function loadProfile(){

    const token = localStorage.getItem("token");

    if(!token){
        alert("Please login first.");
        window.location.href="/login.html";
        return;
    }

    try{

        const res = await fetch("/api/me",{
            headers:{
                "x-auth-token":token
            }
        });

        if(!res.ok){
            localStorage.clear();
            alert("Session expired. Please login again.");
            window.location.href="/login.html";
            return;
        }

        const user = await res.json();

        document.getElementById("username").innerText =
            user.username || "Unknown User";

        document.getElementById("displayName").value =
            user.displayName || "";

        document.getElementById("bio").value =
            user.bio || "";

    }catch(err){

        console.error(err);
        alert("Unable to load profile.");

    }

}

async function saveProfile(){

    alert("Profile saving will be added in the next step.");

}

loadProfile();

</script>

</body>
</html>
