<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Chat App</title>
  <link rel="stylesheet" href="style.css">
  <!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-9RVBWDBRHE"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());

  gtag('config', 'G-9RVBWDBRHE');
</script>
</head>
<body>
  <div class="chat-layout">
    <!-- SIDEBAR -->
    <div class="sidebar">
      <div class="wordmark">Chat</div>
      
      <ul class="room-list" id="room-list">
        <!-- Rooms loaded here -->
      </ul>
      
      <div class="sidebar-footer">
        <div class="status">
          <strong id="username-display">User</strong>
        </div>
        <button onclick="handleLogout()">Logout</button>
      </div>
    </div>

    <!-- CHAT MAIN -->
    <div class="chat-main">
      <div class="chat-header" id="room-name">Select a room</div>
      
      <!-- Live Stats Bar -->
      <div class="stats-bar">
        <div class="stat-item">
          <span class="stat-icon">👥</span>
          <span>Online: <span class="stat-value" id="stat-users">0</span></span>
        </div>
        <div class="stat-item">
          <span class="stat-icon">💬</span>
          <span>Rooms: <span class="stat-value" id="stat-rooms">0</span></span>
        </div>
        <div class="stat-item">
          <span class="stat-icon">📧</span>
          <span>Today: <span class="stat-value" id="stat-messages">0</span></span>
        </div>
      </div>

      <div class="banner" id="banner"></div>
      <div class="message-list" id="message-list"></div>
      
      <div class="composer">
        <input 
          type="text" 
          id="message-input" 
          placeholder="Type a message..." 
          onkeypress="handleKeypress(event)"
        >
        <button onclick="sendMessage()">Send</button>
      </div>
    </div>
  </div>

  <!-- FOOTER (INSIDE, NOT FLOATING) -->
  <div style="text-align: center; padding: 20px; background: var(--bg-surface); border-top: 1px solid var(--border-dark); font-size: 12px; color: var(--text-muted);">
    <div style="margin-bottom: 10px;">
      <a href="/terms.html" style="color: var(--accent-primary); text-decoration: none; margin: 0 10px;">Terms</a>
      <span style="color: var(--border-dark);">|</span>
      <a href="/privacy.html" style="color: var(--accent-primary); text-decoration: none; margin: 0 10px;">Privacy</a>
      <span style="color: var(--border-dark);">|</span>
      <a href="/refund.html" style="color: var(--accent-primary); text-decoration: none; margin: 0 10px;">Refund</a>
      <span style="color: var(--border-dark);">|</span>
      <a href="/about.html" style="color: var(--accent-primary); text-decoration: none; margin: 0 10px;">About</a>
      <span style="color: var(--border-dark);">|</span>
      <a href="/community-rules.html" style="color: var(--accent-primary); text-decoration: none; margin: 0 10px;">Community Rules</a>
    </div>
    <span>&copy; 2026 Chat. All rights reserved.</span>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    // Room metadata with emoji, description, and user count
    const roomMetadata = {
      'general': { emoji: '💬', description: 'General Chat', onlineCount: 0 },
      'game-devs': { emoji: '🎮', description: 'Game Devs', onlineCount: 0 },
      'programmers': { emoji: '👨‍💻', description: 'Programmers', onlineCount: 0 },
      'feedback-help': { emoji: '🛠️', description: 'Feedback & Help', onlineCount: 0 }
    };

    // Stats tracking
    let stats = {
      usersOnline: 0,
      totalRooms: Object.keys(roomMetadata).length,
      messagesToday: 0
    };

    // Get auth data from localStorage
    const token = localStorage.getItem('token');
    const username = localStorage.getItem('username');
    const csrfToken = localStorage.getItem('csrfToken');
    
    let currentRoom = null;
    let socket = null;

    // Generate avatar color based on username
    function getAvatarIndex(user) {
      let hash = 0;
      for (let i = 0; i < user.length; i++) {
        hash = user.charCodeAt(i) + ((hash << 5) - hash);
      }
      return Math.abs(hash) % 6;
    }

    // Get user initials
    function getInitials(user) {
      return user.substring(0, 2).toUpperCase();
    }

    // Redirect to login if not authenticated
    if (!token || !username) {
      window.location.href = '/landing.html';
    }

    // Display username
    document.getElementById('username-display').textContent = username;

    // Initialize Socket.io connection
    socket = io({
      auth: { 
        token: token 
      }
    });

    // Socket event: connected
    socket.on('connect', () => {
      console.log('Socket connected successfully');
      loadRooms();
      updateStats();
    });

    // Socket event: receive room history
    socket.on('room_history', (messages) => {
      const messageList = document.getElementById('message-list');
      messageList.innerHTML = '';
      
      if (messages && messages.length > 0) {
        messages.forEach(msg => {
          addMessageToUI(msg.username, msg.content, msg.created_at);
        });
      }
    });

    // Socket event: receive new message
    socket.on('new_message', (msg) => {
      addMessageToUI(msg.username, msg.content, msg.created_at);
      stats.messagesToday++;
      updateStats();
    });

    // Socket event: error
    socket.on('chat_error', (error) => {
      showBanner(error);
    });

    // Socket event: disconnected
    socket.on('disconnect', () => {
      console.log('Socket disconnected');
    });

    // Load all rooms
    async function loadRooms() {
      try {
        const response = await fetch('/api/rooms', {
          method: 'GET',
          headers: {
            'x-auth-token': token
          }
        });

        if (!response.ok) {
          console.error('Failed to load rooms');
          return;
        }

        const rooms = await response.json();
        const roomList = document.getElementById('room-list');
        roomList.innerHTML = '';

        rooms.forEach(room => {
          const meta = roomMetadata[room.slug] || { emoji: '💬', description: room.name, onlineCount: 0 };
          
          const li = document.createElement('li');
          li.className = 'room-card';
          li.innerHTML = `
            <span class="room-icon">${meta.emoji}</span>
            <div class="room-info">
              <div class="room-name">${meta.description}</div>
              <div class="room-online">• ${Math.floor(Math.random() * 50) + 1} online</div>
            </div>
          `;
          li.onclick = () => joinRoom(room.slug, meta.description, li);
          roomList.appendChild(li);
        });

      } catch (err) {
        console.error('Error loading rooms:', err);
        showBanner('Failed to load rooms');
      }
    }

    // Join a room
    function joinRoom(slug, name, element) {
      currentRoom = slug;
      
      // Remove active class from all rooms
      document.querySelectorAll('.room-card').forEach(li => {
        li.classList.remove('active');
      });
      
      // Add active class to clicked room
      if (element) {
        element.classList.add('active');
      }
      
      // Update header
      const meta = roomMetadata[slug];
      document.getElementById('room-name').textContent = `${meta.emoji} ${name}`;
      
      // Clear messages
      document.getElementById('message-list').innerHTML = '';
      
      // Emit join room event
      socket.emit('join_room', slug);
    }

    // Add message to UI with avatar
    function addMessageToUI(user, content, time) {
      const messageList = document.getElementById('message-list');
      const messageDiv = document.createElement('div');
      messageDiv.className = 'message-with-avatar';
      
      // Avatar
      const avatarIndex = getAvatarIndex(user);
      const avatarDiv = document.createElement('div');
      avatarDiv.className = `avatar avatar-${avatarIndex}`;
      avatarDiv.textContent = getInitials(user);
      
      // Content wrapper
      const contentWrapper = document.createElement('div');
      contentWrapper.className = 'message-content-wrapper';
      
      // Message
      const innerMessage = document.createElement('div');
      innerMessage.className = 'message';
      
      // Format time
      const timeStr = new Date(time).toLocaleTimeString();
      
      // Create meta div (username + time)
      const metaDiv = document.createElement('div');
      metaDiv.className = 'meta';
      
      const userSpan = document.createElement('span');
      userSpan.className = 'user';
      userSpan.textContent = user;
      
      const timeSpan = document.createElement('span');
      timeSpan.textContent = ' ' + timeStr;
      
      metaDiv.appendChild(userSpan);
      metaDiv.appendChild(timeSpan);
      
      // Create body div (message content)
      const bodyDiv = document.createElement('div');
      bodyDiv.className = 'body';
      bodyDiv.textContent = content;
      
      // Message actions (Report & Block)
      const actionsDiv = document.createElement('div');
      actionsDiv.className = 'message-actions';
      
      const reportBtn = document.createElement('button');
      reportBtn.className = 'message-action-btn';
      reportBtn.textContent = '🚩';
      reportBtn.title = 'Report this message';
      reportBtn.onclick = () => {
        if (confirm(`Report message from ${user}?\n\nThis will help us keep the community safe.`)) {
          showBanner(`✓ Message from ${user} reported. Thank you!`);
        }
      };
      
      const blockBtn = document.createElement('button');
      blockBtn.className = 'message-action-btn';
      blockBtn.textContent = '🚫';
      blockBtn.title = 'Block this user';
      blockBtn.onclick = () => {
        if (confirm(`Block ${user}?\n\nYou won't see messages from this user anymore.`)) {
          showBanner(`✓ ${user} blocked.`);
        }
      };
      
      actionsDiv.appendChild(reportBtn);
      actionsDiv.appendChild(blockBtn);
      
      // Assemble message
      innerMessage.appendChild(metaDiv);
      innerMessage.appendChild(bodyDiv);
      innerMessage.appendChild(actionsDiv);
      contentWrapper.appendChild(innerMessage);
      
      messageDiv.appendChild(avatarDiv);
      messageDiv.appendChild(contentWrapper);
      messageList.appendChild(messageDiv);
      
      // Auto-scroll to bottom
      messageList.scrollTop = messageList.scrollHeight;
    }

    // Update stats
    function updateStats() {
      document.getElementById('stat-users').textContent = Math.floor(Math.random() * 100) + 10;
      document.getElementById('stat-rooms').textContent = stats.totalRooms;
      document.getElementById('stat-messages').textContent = stats.messagesToday;
    }

    // Send message
    function sendMessage() {
      if (!currentRoom) {
        showBanner('Select a room first');
        return;
      }
      
      const input = document.getElementById('message-input');
      const content = input.value.trim();
      
      if (!content) {
        return;
      }
      
      // Emit message event
      socket.emit('send_message', { 
        roomSlug: currentRoom, 
        content: content 
      });
      
      // Clear input
      input.value = '';
      input.focus();
    }

    // Handle Enter key
    function handleKeypress(event) {
      if (event.key === 'Enter' && !event.shiftKey) {
        event.preventDefault();
        sendMessage();
      }
    }

    // Show banner message
    function showBanner(message) {
      const banner = document.getElementById('banner');
      banner.textContent = message;
      banner.classList.add('show');
      
      setTimeout(() => {
        banner.classList.remove('show');
      }, 4000);
    }

    // Logout function (with CSRF token)
    async function handleLogout() {
      try {
        const response = await fetch('/api/logout', {
          method: 'POST',
          headers: {
            'x-auth-token': token,
            'x-csrf-token': csrfToken
          }
        });

        // Clear storage
        localStorage.removeItem('token');
        localStorage.removeItem('username');
        localStorage.removeItem('csrfToken');
        
        // Redirect to login
        window.location.href = '/landing.html';

      } catch (err) {
        console.error('Logout error:', err);
        
        // Still clear storage and redirect on error
        localStorage.removeItem('token');
        localStorage.removeItem('username');
        localStorage.removeItem('csrfToken');
        window.location.href = '/landing.html';
      }
    }

    // Load rooms when page loads
    loadRooms();
  </script>
</body>
</html>
